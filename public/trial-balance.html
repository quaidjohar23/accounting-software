<!DOCTYPE html>

<html>

<head>

<title>
Trial Balance
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="header">

Trial Balance

</div>



<div class="content">


<table border="1" cellpadding="10">


<thead>

<tr>

<th>
Account
</th>

<th>
Debit
</th>

<th>
Credit
</th>

</tr>

</thead>


<tbody id="data">

</tbody>


</table>


</div>



<script>


fetch("/trial-balance")


.then(res=>res.json())


.then(rows=>{


let html="";


rows.forEach(r=>{


html+=`

<tr>

<td>${r.name}</td>

<td>${r.debit}</td>

<td>${r.credit}</td>

</tr>

`;



});


document.getElementById("data")
.innerHTML=html;


});


</script>



</body>

</html>
