<!DOCTYPE html>

<html>

<head>

<title>
Voucher Entry
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<h2>
Voucher Entry
</h2>


<select id="type">


<option>
Sales
</option>

<option>
Purchase
</option>


<option>
Receipt
</option>


<option>
Payment
</option>


</select>



<br>


<input 
id="voucher_no"
placeholder="Voucher Number">


<br>


<input 
type="date"
id="date">


<br>


<input 
id="party"
placeholder="Customer/Supplier">


<br>


<select id="debit">

</select>


<br>


<select id="credit">

</select>


<br>


<input 
id="amount"
placeholder="Amount">


<br>


<input
id="description"
placeholder="Description">


<br>


<button onclick="saveVoucher()">

Save Voucher

</button>


<h3 id="msg"></h3>


<script>



loadAccounts();



function loadAccounts(){


fetch("/accounts")

.then(res=>res.json())

.then(accounts=>{


let html="";


accounts.forEach(a=>{


html+=`

<option value="${a.id}">
${a.name}
</option>

`;


});


document.getElementById("debit")
.innerHTML=html;


document.getElementById("credit")
.innerHTML=html;


});


}




function saveVoucher(){



let data={


voucher_no:
document.getElementById("voucher_no").value,


date:
document.getElementById("date").value,


type:
document.getElementById("type").value,


party_name:
document.getElementById("party").value,


debit_account:
document.getElementById("debit").value,


credit_account:
document.getElementById("credit").value,


amount:
document.getElementById("amount").value,


description:
document.getElementById("description").value



};



fetch("/voucher",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)


})


.then(res=>res.json())


.then(result=>{


document.getElementById("msg")
.innerHTML=result.message;


});



}



</script>


</body>

</html>
