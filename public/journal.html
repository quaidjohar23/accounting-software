<!DOCTYPE html>

<html>


<head>

<title>
Journal Entry
</title>



<link rel="stylesheet" href="style.css">


</head>



<body>



<h2>
Journal Entry
</h2>



<label>Date</label>

<br>

<input 
type="date"
id="date">


<br>



<label>Debit Account</label>

<br>


<select id="debit">


</select>



<br>


<label>Credit Account</label>

<br>


<select id="credit">


</select>



<br>


<label>Amount</label>

<br>


<input 
type="number"
id="amount">


<br>


<label>Description</label>

<br>


<input 
type="text"
id="description">


<br>



<button onclick="saveEntry()">

Save Journal Entry

</button>



<h3 id="message"></h3>





<script>



loadAccounts();



function loadAccounts(){



fetch("/accounts")


.then(res=>res.json())


.then(accounts=>{


let options="";



accounts.forEach(acc=>{


options += `

<option value="${acc.id}">

${acc.name}

</option>

`;


});



document.getElementById("debit")
.innerHTML=options;



document.getElementById("credit")
.innerHTML=options;



});



}






function saveEntry(){



let entry={


date:
document.getElementById("date").value,


debit_account:
document.getElementById("debit").value,


credit_account:
document.getElementById("credit").value,


amount:
document.getElementById("amount").value,


description:
document.getElementById("description").value



};



fetch("/journal",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify(entry)



})


.then(res=>res.json())


.then(result=>{


document.getElementById("message")
.innerHTML=result.message;


});



}



</script>



</body>


</html>
